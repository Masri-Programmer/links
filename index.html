    // Sticky CTA — show after scrolling past the card header

            if (!ticking) {
                window.requestAnimationFrame(function() {
                    if (window.scrollY > 300) {
                        cta.classList.add('visible');
                    } else {
                        cta.classList.remove('visible');
                    }
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });
    }

    // Number counting animation
    function initCounters() {
        const counters = document.querySelectorAll('.counter');
        const speed = 100; 

        // Dropped threshold to 0.1 to trigger as soon as the element enters view
        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const counter = entry.target;
                    const target = +counter.getAttribute('data-target');
                    const decimals = +counter.getAttribute('data-decimals') || 0;
                    const inc = target / speed;

                    let currentCount = 0;

                    function updateCount() {
                        if (currentCount < target) {
                            currentCount += inc;
                            // Ensure we don't overshoot
                            if (currentCount > target) currentCount = target;
                            
                            counter.innerText = currentCount.toFixed(decimals);
                            
                            if (currentCount < target) {
                                requestAnimationFrame(updateCount);
                            }
                        } else {
                            counter.innerText = target.toFixed(decimals);
                        }
                    }

                    updateCount();
                    observer.unobserve(counter);
                }
            });
        }, { threshold: 0.1 });

        counters.forEach(counter => {
            observer.observe(counter);
        });
    }
