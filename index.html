        // Sticky CTA — show after scrolling past the card header
        function initStickyCta() {
            const cta = document.getElementById('stickyCta');
            if (!cta) return;

            let ticking = false;
            window.addEventListener('scroll', function() {
                if (!ticking) {
                    window.requestAnimationFrame(function() {
                        if (window.scrollY > 300) {
                            cta.classList.add('visible');
                        } else {
                            cta.classList.remove('visible');
                        }
                        ticking = false;
                    });
                    ticking = true;
                }
            }, { passive: true });
        }

        // Initialize
        async function init() {
            try {

                if (!res.ok) throw new Error('Could not load private.json');
